name: Build GSE Terminal APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Download Gradle wrapper jar
        run: |
          curl -L --retry 3 \
            "https://services.gradle.org/distributions/gradle-8.7-bin.zip" \
            -o /tmp/gradle.zip
          unzip -p /tmp/gradle.zip \
            "gradle-8.7/lib/plugins/gradle-tooling-api-8.7.jar" > /dev/null 2>&1 || true
          find /tmp -name "gradle-wrapper-*.jar" 2>/dev/null | head -1 | \
            xargs -I{} cp {} gradle/wrapper/gradle-wrapper.jar 2>/dev/null || \
          curl -L --retry 3 \
            "https://repo1.maven.org/maven2/org/gradle/gradle-wrapper/8.7/gradle-wrapper-8.7.jar" \
            -o gradle/wrapper/gradle-wrapper.jar || \
          curl -L --retry 3 \
            "https://jcenter.bintray.com/org/gradle/gradle-wrapper/8.7/gradle-wrapper-8.7.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          ls -lh gradle/wrapper/gradle-wrapper.jar
      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GSETerminal-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
