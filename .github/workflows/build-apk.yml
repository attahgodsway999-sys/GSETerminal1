name: Build GSE Terminal APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Install Gradle 8.7
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -P /tmp
          unzip -q /tmp/gradle-8.7-bin.zip -d /opt
          echo "/opt/gradle-8.7/bin" >> $GITHUB_PATH

      - name: Create all directories first
        run: |
          mkdir -p app/src/main/java/com/gseterminal/app
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          mkdir -p app/src/main/assets
          mkdir -p gradle/wrapper
          echo "✅ All directories created"

      - name: Write Gradle files
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          android.enableJetifier=false
          EOF

          cat > settings.gradle.kts << 'EOF'
          pluginManagement {
              repositories {
                  gradlePluginPortal()
                  google()
                  mavenCentral()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "GSETerminal"
          include(":app")
          EOF

          cat > build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application") version "8.5.0" apply false
              id("org.jetbrains.kotlin.android") version "1.9.24" apply false
          }
          EOF

          cat > app/build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }
          android {
              namespace  = "com.gseterminal.app"
              compileSdk = 34
              defaultConfig {
                  applicationId = "com.gseterminal.app"
                  minSdk        = 24
                  targetSdk     = 34
                  versionCode   = 1
                  versionName   = "1.0.0"
              }
              buildTypes {
                  release { isMinifyEnabled = false }
              }
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }
              kotlinOptions { jvmTarget = "17" }
              buildFeatures { viewBinding = true }
          }
          dependencies {
              implementation("androidx.core:core-ktx:1.13.1")
              implementation("androidx.appcompat:appcompat:1.7.0")
              implementation("com.google.android.material:material:1.12.0")
              implementation("androidx.constraintlayout:constraintlayout:2.1.4")
              implementation("androidx.swiperefreshlayout:swiperefreshlayout:1.1.0")
              implementation("androidx.webkit:webkit:1.11.0")
          }
          EOF

          cat > app/proguard-rules.pro << 'EOF'
          -keepattributes JavascriptInterface
          -keepclassmembers class com.gseterminal.app.WebAppInterface { public *; }
          EOF

          echo "✅ Gradle files written"

      - name: Write Kotlin source files
        run: |
          cat > app/src/main/java/com/gseterminal/app/GSEApplication.kt << 'EOF'
          package com.gseterminal.app
          import android.app.Application
          import android.webkit.WebView
          class GSEApplication : Application() {
              override fun onCreate() {
                  super.onCreate()
                  if (BuildConfig.DEBUG) WebView.setWebContentsDebuggingEnabled(true)
              }
          }
          EOF

          cat > app/src/main/java/com/gseterminal/app/SplashActivity.kt << 'EOF'
          package com.gseterminal.app
          import android.annotation.SuppressLint
          import android.content.Intent
          import android.os.Bundle
          import android.os.Handler
          import android.os.Looper
          import androidx.appcompat.app.AppCompatActivity
          @SuppressLint("CustomSplashScreen")
          class SplashActivity : AppCompatActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_splash)
                  Handler(Looper.getMainLooper()).postDelayed({
                      startActivity(Intent(this, MainActivity::class.java))
                  }, 1800L)
              }
          }
          EOF

          cat > app/src/main/java/com/gseterminal/app/WebAppInterface.kt << 'EOF'
          package com.gseterminal.app
          import android.content.Context
          import android.content.Intent
          import android.net.Uri
          import android.webkit.JavascriptInterface
          import android.widget.Toast
          class WebAppInterface(private val context: Context) {
              @JavascriptInterface
              fun showToast(msg: String) {
                  (context as? MainActivity)?.runOnUiThread {
                      Toast.makeText(context, msg, Toast.LENGTH_SHORT).show()
                  }
              }
              @JavascriptInterface
              fun openUrl(url: String) {
                  try {
                      context.startActivity(
                          Intent(Intent.ACTION_VIEW, Uri.parse(url)).apply {
                              addFlags(Intent.FLAG_ACTIVITY_NEW_TASK)
                          }
                      )
                  } catch (e: Exception) {}
              }
              @JavascriptInterface fun isAndroid(): Boolean = true
              @JavascriptInterface fun getAppVersion(): String = BuildConfig.VERSION_NAME
          }
          EOF

          cat > app/src/main/java/com/gseterminal/app/MainActivity.kt << 'EOF'
